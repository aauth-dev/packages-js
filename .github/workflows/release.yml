name: Publish

# Triggered by a published GitHub Release. The release tag is just a marker
# (e.g. a date/time) — it does NOT have to match any package version. Packages
# are versioned independently; each is published only when its own
# package.json version differs from what's already on npm.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: (cd interaction-code && npm run build)
      - run: npm test

  # Only (re)build + publish the native hardware-keys packages when their version
  # actually changed. Decoupled from the JS packages so a JS-only release never
  # touches the natives or their lockfile entries (which would otherwise create a
  # publish/lockfile catch-22: npm ci verifies native integrity against published
  # tarballs, but the new tarballs only get published by the release itself).
  check-hardware-keys:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.c.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
      - id: c
        run: |
          version=$(node -p "require('./hardware-keys/package.json').version")
          published=$(npm view "@aauth/hardware-keys" version 2>/dev/null || echo "0.0.0")
          if [ "$version" = "$published" ]; then
            echo "hardware-keys@$version already published — skipping native build/publish"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "hardware-keys@$version (npm has $published) — will build + publish"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  hardware-keys:
    needs: check-hardware-keys
    if: needs.check-hardware-keys.outputs.changed == 'true'
    uses: ./.github/workflows/hardware-keys.yml
    with:
      publish: true
    permissions:
      contents: read
      id-token: write

  publish:
    needs: [test, hardware-keys]
    # hardware-keys is SKIPPED (not failed) on a JS-only release — proceed as long
    # as tests passed and the native job didn't actually fail.
    if: always() && needs.test.result == 'success' && needs.hardware-keys.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Build packages (dependency order)
        run: |
          for pkg in interaction-code local-keys mcp-agent mcp-server bootstrap fetch mcp-openclaw mcp-stdio; do
            echo "Building $pkg..."
            (cd "$pkg" && npm run build)
          done

      # Independent per-package versions: publish each package only when its own
      # package.json version differs from what's on npm. No release-tag /
      # all-must-match gate.
      - name: Publish changed packages with provenance
        run: |
          for pkg in interaction-code local-keys mcp-agent mcp-server bootstrap fetch mcp-openclaw mcp-stdio; do
            version=$(node -p "require('./$pkg/package.json').version")
            published=$(npm view "@aauth/$pkg" version 2>/dev/null || echo "0.0.0")
            if [ "$version" = "$published" ]; then
              echo "Skipping @aauth/$pkg@$version (already published)"
            else
              echo "Publishing @aauth/$pkg@$version (npm has $published)..."
              (cd "$pkg" && npm publish --provenance --access public)
            fi
          done
